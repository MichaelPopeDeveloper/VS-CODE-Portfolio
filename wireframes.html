<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Wireframes — Michael Pope Portfolio</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #fafaf6;
    --line: #2a2a2a;
    --muted: #888;
    --accent: #ff6b35;
    --accent-2: #4a8fc7;
    --hand: 'Kalam', 'Caveat', cursive;
    --display: 'Caveat', cursive;
    --mono: 'JetBrains Mono', monospace;
  }
  html, body { background: #e8e6df; }
  body { font-family: var(--hand); color: var(--ink); }
  /* Wireframe primitives */
  .wf { background: var(--paper); color: var(--ink); width: 100%; height: 100%; position: relative; overflow: hidden; font-family: var(--hand); }
  .wf .border { position: absolute; inset: 0; border: 1.5px solid var(--line); border-radius: 6px; pointer-events: none; }
  .wf .label { font-family: var(--display); font-size: 22px; }
  .wf .scribble { font-family: var(--hand); font-size: 14px; color: #444; }
  .wf .tiny { font-family: var(--hand); font-size: 12px; color: #666; }
  .wf .mono { font-family: var(--mono); font-size: 11px; color: #444; }
  .wf .chip { border: 1.2px solid var(--line); border-radius: 999px; padding: 2px 10px; font-family: var(--hand); font-size: 13px; display: inline-block; }
  .wf .box { border: 1.5px solid var(--line); border-radius: 4px; }
  .wf .box-dashed { border: 1.5px dashed #555; border-radius: 4px; }
  .wf .accent { color: var(--accent); }
  .wf .blue { color: var(--accent-2); }
  .wf .hatched {
    background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.06) 0 1px, transparent 1px 6px);
  }
  .wf .squiggle {
    height: 2px;
    background: repeating-linear-gradient(90deg, var(--ink) 0 4px, transparent 4px 8px);
  }
  .wf .underline-hand {
    position: relative;
  }
  .wf .underline-hand::after {
    content: ''; position: absolute; left: -2px; right: -2px; bottom: -4px; height: 4px;
    background: var(--accent); opacity: .6;
    border-radius: 2px;
    transform: skewX(-4deg);
  }
  /* status / chrome bits */
  .wf .titlebar {
    height: 22px; border-bottom: 1.5px solid var(--line); display:flex; align-items:center; gap:6px; padding: 0 10px;
    background: #f0eee6;
  }
  .wf .dot { width:8px; height:8px; border-radius: 50%; border: 1.2px solid var(--line); }
  .wf .tabbar {
    height: 26px; border-bottom: 1.5px solid var(--line); display:flex; align-items:end; padding: 0 10px; gap: 4px;
  }
  .wf .tab { border: 1.2px solid var(--line); border-bottom: none; padding: 2px 10px; font-family: var(--mono); font-size: 11px; border-top-left-radius: 6px; border-top-right-radius: 6px; background: #f0eee6; }
  .wf .tab.active { background: var(--paper); position: relative; top: 1px; }
  .wf .statusbar {
    position: absolute; left: 0; right: 0; bottom: 0; height: 22px;
    border-top: 1.5px solid var(--line); display: flex; align-items: center; padding: 0 10px;
    font-family: var(--mono); font-size: 11px; gap: 14px; background: #f0eee6;
  }
  .wf .mode-pill { background: var(--ink); color: var(--paper); padding: 1px 8px; border-radius: 2px; font-family: var(--mono); font-size: 10.5px; }
  .wf .gutter { font-family: var(--mono); font-size: 10.5px; color: #999; text-align: right; line-height: 1.5; }
  .wf .cursor-block { display: inline-block; width: 7px; height: 14px; background: var(--ink); vertical-align: -2px; }

  /* arrows / annotations */
  .annot { position: absolute; font-family: var(--hand); font-size: 13px; color: #c2410c; }
  .annot .arrow { display: block; }

  /* Layout helpers */
  .row { display: flex; }
  .col { display: flex; flex-direction: column; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>
</body>
</html>
