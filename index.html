<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>~/michaelpope — :portfolio</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============== THEME TOKENS ============== */
  :root {
    --bg: #1a1b26;
    --bg-2: #16171f;
    --bg-3: #1f2030;
    --bg-elev: #232434;
    --fg: #c0caf5;
    --fg-dim: #9aa5ce;
    --fg-mute: #565f89;
    --line: #2a2b3d;
    --line-strong: #3b3d5b;
    --accent: #7aa2f7;     /* blue */
    --accent-2: #bb9af7;   /* purple */
    --accent-3: #9ece6a;   /* green */
    --accent-warn: #e0af68;
    --accent-red: #f7768e;
    --accent-cyan: #7dcfff;
    --display: 'Fraunces', 'Times New Roman', serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --ui: 'JetBrains Mono', ui-monospace, monospace;
    --density-pad: 24px;
    --density-gap: 16px;
    --base-size: 14px;
  }
  [data-theme="gruvbox"] {
    --bg: #1d2021; --bg-2: #161819; --bg-3: #282828; --bg-elev: #32302f;
    --fg: #ebdbb2; --fg-dim: #d5c4a1; --fg-mute: #928374;
    --line: #3c3836; --line-strong: #504945;
    --accent: #fabd2f; --accent-2: #d3869b; --accent-3: #b8bb26;
    --accent-warn: #fe8019; --accent-red: #fb4934; --accent-cyan: #83a598;
  }
  [data-theme="dracula"] {
    --bg: #282a36; --bg-2: #1e1f29; --bg-3: #343746; --bg-elev: #44475a;
    --fg: #f8f8f2; --fg-dim: #bdbdca; --fg-mute: #6272a4;
    --line: #44475a; --line-strong: #6272a4;
    --accent: #bd93f9; --accent-2: #ff79c6; --accent-3: #50fa7b;
    --accent-warn: #ffb86c; --accent-red: #ff5555; --accent-cyan: #8be9fd;
  }
  [data-theme="ghostty"] {
    --bg: #0a0a0a; --bg-2: #050505; --bg-3: #141414; --bg-elev: #1c1c1c;
    --fg: #e5e5e5; --fg-dim: #a3a3a3; --fg-mute: #525252;
    --line: #262626; --line-strong: #404040;
    --accent: #ff6b35; --accent-2: #ffa657; --accent-3: #b8e986;
    --accent-warn: #f5d76e; --accent-red: #ff5e5e; --accent-cyan: #8be9fd;
  }

  [data-font="all-mono"] { --display: 'JetBrains Mono', monospace; --ui: 'JetBrains Mono', monospace; }
  [data-font="mono-sans"] { --display: 'Geist', system-ui, sans-serif; --ui: 'Geist', system-ui, sans-serif; }

  [data-density="compact"] { --density-pad: 14px; --density-gap: 10px; --base-size: 13px; }
  [data-density="roomy"]   { --density-pad: 36px; --density-gap: 24px; --base-size: 15px; }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg-2); color: var(--fg);
    font-family: var(--mono); font-size: var(--base-size);
    height: 100%; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ============== ROOT FRAME ============== */
  .frame {
    height: 100vh; display: flex; flex-direction: column;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  /* CRT scanlines */
  .frame.crt::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
  }
  .frame.crt::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 51;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
  }

  /* ============== TITLEBAR ============== */
  .titlebar {
    height: 30px; flex: none;
    background: var(--bg-2); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 14px; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--fg-mute);
    user-select: none;
  }
  .traffic { display: flex; gap: 6px; }
  .traffic > span { width: 11px; height: 11px; border-radius: 50%; }
  .traffic .r { background: #ff5f57; } .traffic .y { background: #febc2e; } .traffic .g { background: #28c840; }
  .titlebar .path { margin-left: auto; margin-right: auto; opacity: .8; }
  .titlebar .path b { color: var(--fg-dim); font-weight: 500; }

  /* ============== TAB BAR ============== */
  .tabbar {
    height: 32px; flex: none; background: var(--bg-2);
    display: flex; align-items: stretch; border-bottom: 1px solid var(--line);
    padding-left: 8px; overflow: hidden;
  }
  .tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px; font-family: var(--mono); font-size: 11px;
    color: var(--fg-mute); border-right: 1px solid var(--line);
    cursor: pointer; transition: color .15s, background .15s;
    position: relative; min-width: 100px; white-space: nowrap;
  }
  .tab:hover { color: var(--fg-dim); background: var(--bg-3); }
  .tab.active { color: var(--fg); background: var(--bg); }
  .tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; top: 0; height: 2px;
    background: var(--accent);
  }
  .tab .modified { color: var(--accent-warn); }
  .tab .close { opacity: .5; margin-left: 4px; }
  .tab .close:hover { opacity: 1; color: var(--accent-red); }
  .tabbar .spacer { flex: 1; border-bottom: 1px solid var(--line); }

  /* ============== BODY ============== */
  .body { flex: 1; display: flex; min-height: 0; position: relative; }

  /* ============== SIDEBAR (NERDTree) ============== */
  .sidebar {
    width: 240px; flex: none; background: var(--bg-2);
    border-right: 1px solid var(--line); padding: 14px 12px;
    overflow: auto; font-family: var(--mono); font-size: 12px;
    color: var(--fg-dim);
  }
  .sidebar h4 {
    font-size: 10px; font-weight: 500; color: var(--fg-mute);
    text-transform: uppercase; letter-spacing: 1.2px; margin: 4px 0 10px;
  }
  .tree { line-height: 1.7; }
  .tree .row { display: flex; gap: 6px; align-items: baseline; cursor: pointer; padding: 0 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; }
  .tree .row .file, .tree .row .dir { overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .tree .row:hover { background: var(--bg-3); color: var(--fg); }
  .tree .row.active { background: var(--bg-elev); color: var(--accent); }
  .tree .caret { color: var(--fg-mute); width: 10px; display: inline-block; }
  .tree .ico { color: var(--fg-mute); }
  .tree .indent { padding-left: 16px; }
  .tree .dir { color: var(--accent); font-weight: 500; }
  .tree .file { color: var(--fg-dim); }

  /* ============== MAIN ============== */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  .pane-container { flex: 1; display: flex; min-height: 0; overflow: hidden; }
  .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .pane + .pane { border-left: 1px solid var(--line-strong); }

  .buffer-head {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px; background: var(--bg-2); border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; color: var(--fg-mute);
    flex: none;
  }
  .buffer-head .badge {
    background: var(--bg-3); padding: 1px 6px; border-radius: 2px;
    color: var(--fg-dim);
  }

  .buffer { flex: 1; overflow: auto; display: flex; min-height: 0; position: relative; }
  .buffer::-webkit-scrollbar { width: 8px; height: 8px; }
  .buffer::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
  .buffer::-webkit-scrollbar-track { background: transparent; }

  .gutter {
    flex: none; padding: var(--density-pad) 8px var(--density-pad) 12px;
    text-align: right; color: var(--fg-mute); font-family: var(--mono);
    font-size: 12px; line-height: 1.65; user-select: none;
    border-right: 1px solid var(--line); min-width: 50px;
    background: var(--bg-2);
  }
  .gutter .ln { opacity: .6; }
  .gutter .ln.active { color: var(--accent-warn); opacity: 1; }

  .content {
    flex: 1; padding: var(--density-pad) calc(var(--density-pad) + 8px) 60px;
    line-height: 1.65; min-width: 0;
  }
  .content > section { margin-bottom: calc(var(--density-gap) * 2); }
  .content h2 {
    font-family: var(--display); font-weight: 400; font-style: italic;
    font-size: 14px; color: var(--fg-mute); letter-spacing: 0.2px;
    margin: 0 0 4px; text-transform: lowercase;
  }
  .content .h2-mark { color: var(--accent-2); margin-right: 6px; font-style: normal; font-family: var(--mono); }

  /* ============== TYPOGRAPHY ============== */
  .display {
    font-family: var(--display); font-weight: 400;
    font-size: clamp(48px, 6.5vw, 88px);
    line-height: 0.96; letter-spacing: -0.02em;
    font-variation-settings: "SOFT" 50, "opsz" 144;
    color: var(--fg);
  }
  .display em { font-style: italic; color: var(--accent); font-variation-settings: "SOFT" 80, "opsz" 144; }
  .display .amp {
    font-style: italic; color: var(--accent-2);
    font-variation-settings: "SOFT" 100, "opsz" 144;
  }
  .lede { font-family: var(--mono); color: var(--fg-dim); max-width: 56ch; line-height: 1.65; font-size: 13px; }

  .kw { color: var(--accent-2); }
  .str { color: var(--accent-3); }
  .num { color: var(--accent-warn); }
  .com { color: var(--fg-mute); font-style: italic; }
  .fn { color: var(--accent); }
  .var { color: var(--accent-cyan); }
  .pun { color: var(--fg-mute); }

  .cursor {
    display: inline-block; width: 0.55em; height: 1.1em; vertical-align: -2px;
    background: var(--accent); animation: blink 1.6s ease-in-out infinite;
    margin-left: 2px;
    box-shadow: 0 0 12px var(--accent);
    border-radius: 1px;
  }
  @keyframes blink {
    0%, 45%   { opacity: 1; }
    55%, 95%  { opacity: 0; }
    100%      { opacity: 1; }
  }

  /* ============== HERO ============== */
  .hero { padding-top: 8px; }
  .hero .sub {
    font-family: var(--mono); color: var(--accent-3); font-size: 12px;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .hero .sub::before { content: '▸'; color: var(--accent); }
  .hero .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 22px; max-width: 720px; }
  .hero .tags .t {
    font-family: var(--mono); font-size: 11px; color: var(--fg-dim);
    border: 1px solid var(--line-strong); padding: 3px 9px; border-radius: 2px;
    background: var(--bg-2);
  }
  .hero .tags .t.hi { color: var(--accent); border-color: var(--accent); }

  .hero-row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; margin-top: 26px; }
  @media (max-width: 980px) { .hero-row { grid-template-columns: 1fr; } }

  .ascii {
    font-family: var(--mono); font-size: 9px; line-height: 1.05;
    color: var(--accent); white-space: pre; opacity: .85;
    text-shadow: 0 0 8px rgba(122,162,247,0.3);
  }

  /* ============== EXPERIENCE TABLE ============== */
  .xp { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  .xp th {
    text-align: left; padding: 6px 10px; font-weight: 400;
    color: var(--fg-mute); border-bottom: 1px solid var(--line);
    text-transform: uppercase; font-size: 10px; letter-spacing: 1.2px;
  }
  .xp td {
    padding: 12px 10px; border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  .xp tr:hover td { background: var(--bg-3); cursor: pointer; }
  .xp .co { color: var(--fg); font-weight: 500; }
  .xp .role { color: var(--fg-dim); font-size: 11px; }
  .xp .yr { color: var(--accent-warn); white-space: nowrap; }
  .xp .stack { color: var(--accent-3); font-size: 11px; }

  /* ============== PROJECT CARDS ============== */
  .projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--density-gap); }
  .card {
    background: var(--bg-2); border: 1px solid var(--line);
    padding: 18px; position: relative;
    transition: border-color .15s, transform .15s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .idx { font-family: var(--mono); font-size: 10px; color: var(--fg-mute); }
  .card h3 {
    font-family: var(--display); font-weight: 400; font-size: 22px;
    margin: 6px 0 4px; line-height: 1.1; color: var(--fg);
  }
  .card .org { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-bottom: 12px; }
  .card .desc { font-family: var(--mono); font-size: 12px; color: var(--fg-dim); line-height: 1.6; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 12px; }
  .card .meta span { font-size: 10px; color: var(--fg-mute); border: 1px solid var(--line); padding: 1px 6px; }
  .card .stat {
    margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line-strong);
    font-family: var(--mono); font-size: 11px;
    color: var(--accent-3);
  }
  .card .stat b { color: var(--accent-warn); font-weight: 600; }

  /* ============== WRITING / CONTACT ============== */
  .writing-list .row {
    display: flex; align-items: baseline; gap: 14px; padding: 10px 0;
    border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12px;
  }
  .writing-list .row .date { color: var(--fg-mute); width: 80px; flex: none; }
  .writing-list .row .title { color: var(--fg); flex: 1; }
  .writing-list .row .tag { color: var(--accent-2); }
  .writing-list .row:hover .title { color: var(--accent); cursor: pointer; }

  .contact-card {
    border: 1px dashed var(--line-strong); padding: 24px;
    background: linear-gradient(180deg, var(--bg-2), transparent);
  }
  .contact-card .links { display: grid; gap: 10px; margin-top: 14px; }
  .contact-card .lk {
    display: flex; gap: 12px; align-items: baseline; padding: 10px 14px;
    border: 1px solid var(--line); font-family: var(--mono); font-size: 12px;
    color: var(--fg-dim); background: var(--bg);
    text-decoration: none; transition: all .15s;
  }
  .contact-card .lk:hover { border-color: var(--accent); color: var(--accent); transform: translateX(4px); }
  .contact-card .lk .key { color: var(--accent-2); width: 90px; }
  .contact-card .lk .val { color: var(--fg); }

  /* ============== STATUSLINE ============== */
  .statusline {
    height: 24px; flex: none; display: flex; align-items: center;
    background: var(--bg-2); border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; color: var(--fg-dim);
    padding: 0;
  }
  .statusline .seg { padding: 0 10px; height: 100%; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .statusline .mode { background: var(--accent); color: var(--bg); font-weight: 700; letter-spacing: 1px; }
  .statusline .mode.insert { background: var(--accent-3); }
  .statusline .mode.visual { background: var(--accent-2); }
  .statusline .mode.command { background: var(--accent-warn); }
  .statusline .branch { color: var(--accent-3); }
  .statusline .branch::before { content: ' '; }
  .statusline .file { color: var(--fg-dim); }
  .statusline .file b { color: var(--fg); font-weight: 500; }
  .statusline .right { margin-left: auto; display: flex; }
  .statusline .right .seg { background: var(--bg-3); border-left: 1px solid var(--line); }
  .statusline .right .seg.last { background: var(--accent); color: var(--bg); font-weight: 600; }

  /* ============== COMMAND BAR ============== */
  .cmdbar {
    position: absolute; left: 0; right: 0; bottom: 24px;
    background: var(--bg-2); border-top: 1px solid var(--accent-warn);
    padding: 6px 12px; font-family: var(--mono); font-size: 13px;
    color: var(--fg); display: flex; align-items: center; gap: 8px;
    z-index: 40;
  }
  .cmdbar .prompt { color: var(--accent-warn); font-weight: 700; }
  .cmdbar input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--fg); font: inherit; caret-color: var(--accent);
  }
  .cmd-suggestions {
    position: absolute; left: 0; right: 0; bottom: 60px; max-height: 220px;
    background: var(--bg-2); border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line); overflow: auto;
    font-family: var(--mono); font-size: 12px;
    z-index: 40;
  }
  .cmd-suggestions .item {
    padding: 6px 14px; display: flex; gap: 12px; cursor: pointer;
    color: var(--fg-dim);
  }
  .cmd-suggestions .item.sel { background: var(--accent); color: var(--bg); }
  .cmd-suggestions .item .k { color: var(--accent-warn); width: 130px; }
  .cmd-suggestions .item.sel .k { color: var(--bg); }
  .cmd-suggestions .item .d { color: var(--fg-mute); }
  .cmd-suggestions .item.sel .d { color: var(--bg); opacity: .7; }

  /* ============== KEY HINT TOAST ============== */
  .keyhint {
    position: absolute; right: 16px; bottom: 36px; z-index: 30;
    background: var(--bg-elev); border: 1px solid var(--line-strong);
    padding: 10px 14px; font-family: var(--mono); font-size: 11px;
    color: var(--fg-dim); max-width: 240px; line-height: 1.7;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .keyhint kbd {
    background: var(--bg-2); border: 1px solid var(--line-strong);
    padding: 1px 5px; border-radius: 2px; color: var(--accent-warn);
    font-family: var(--mono); font-size: 10px;
  }
  .keyhint .x { color: var(--fg-mute); cursor: pointer; float: right; margin-left: 8px; }
  .keyhint .x:hover { color: var(--accent-red); }

  /* ============== BOOT SEQUENCE ============== */
  .boot {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg-2); color: var(--accent-3);
    font-family: var(--mono); font-size: 12px;
    padding: 40px; line-height: 1.7; overflow: hidden;
  }
  .boot .line { white-space: pre; }
  .boot .ok { color: var(--accent-3); }
  .boot .warn { color: var(--accent-warn); }
  .boot .info { color: var(--accent); }
  .boot .dim { color: var(--fg-mute); }
  .boot .ascii-mp {
    color: var(--accent); margin: 16px 0; font-size: 10px;
    text-shadow: 0 0 10px var(--accent);
  }

  /* ============== CURSOR TRAIL ============== */
  .trail {
    position: fixed; pointer-events: none; width: 8px; height: 14px;
    background: var(--accent); opacity: .6; z-index: 100;
    mix-blend-mode: screen;
  }

  /* ============== TWEAKS PANEL ============== */
  .tweaks {
    position: fixed; right: 16px; bottom: 60px; z-index: 80;
    width: 280px; background: var(--bg-2);
    border: 1px solid var(--line-strong);
    font-family: var(--mono); font-size: 11px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: none;
  }
  .tweaks.open { display: block; }
  .tweaks .head {
    padding: 8px 12px; background: var(--bg-3); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
  }
  .tweaks .head b { color: var(--accent); font-weight: 600; flex: 1; }
  .tweaks .head .x { color: var(--fg-mute); cursor: pointer; }
  .tweaks .body { padding: 12px; display: grid; gap: 12px; max-height: 60vh; overflow: auto; }
  .tweaks label { color: var(--fg-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; display:block; margin-bottom: 4px; }
  .tweaks .seg {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    border: 1px solid var(--line); background: var(--bg);
  }
  .tweaks .seg button {
    background: transparent; border: none; color: var(--fg-dim);
    padding: 6px; font: inherit; cursor: pointer; font-size: 10px;
  }
  .tweaks .seg button.on { background: var(--accent); color: var(--bg); }
  .tweaks .swatches { display: flex; gap: 6px; }
  .tweaks .sw { width: 28px; height: 28px; border: 1px solid var(--line); cursor: pointer; }
  .tweaks .sw.on { outline: 2px solid var(--fg); outline-offset: 2px; }
  .tweaks .toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; color: var(--fg-dim);
  }
  .tweaks .toggle input { accent-color: var(--accent); }

  /* mobile */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .keyhint { display: none; }
    .pane + .pane { display: none; }
    .gutter { min-width: 36px; padding-left: 6px; }
    .display { font-size: 44px; }
  }
</style>
</head>

<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a1b26"/>
  <rect x="120" y="120" width="160" height="160" rx="8" fill="#16171f" stroke="#7aa2f7" stroke-width="2"/>
  <text x="200" y="220" text-anchor="middle" font-family="monospace" font-size="56" font-weight="700" fill="#7aa2f7">MP</text>
  <text x="200" y="260" text-anchor="middle" font-family="monospace" font-size="14" fill="#9ece6a">:portfolio</text>
</svg>
</template>
<div id="boot" class="boot"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  // Boot sequence — runs before React mounts
  (function() {
    const boot = document.getElementById('boot');
    const lines = [
      { t: '[<span class="ok">  OK  </span>] ghostty 1.0.1 — terminal initialized', d: 60 },
      { t: '[<span class="ok">  OK  </span>] loading config: <span class="info">~/.config/ghostty/config</span>', d: 80 },
      { t: '[<span class="ok">  OK  </span>] font: JetBrains Mono Nerd Font 14pt', d: 60 },
      { t: '[<span class="ok">  OK  </span>] theme: tokyo-night', d: 50 },
      { t: '[<span class="ok">  OK  </span>] sourcing <span class="info">~/.zshrc</span>', d: 100 },
      { t: '[<span class="ok">  OK  </span>] starting tmux session: <span class="info">portfolio</span>', d: 80 },
      { t: '[<span class="ok">  OK  </span>] launching neovim 0.10.2', d: 90 },
      { t: '[<span class="warn">  ..  </span>] loading 47 plugins via lazy.nvim', d: 220 },
      { t: '[<span class="ok">  OK  </span>] LSP: tsserver, rust-analyzer, gopls, pyright', d: 120 },
      { t: '[<span class="ok">  OK  </span>] treesitter: typescript javascript rust go python', d: 80 },
      { t: '[<span class="ok">  OK  </span>] git branch: <span class="info">main</span> · clean', d: 60 },
      { t: '<span class="dim">────────────────────────────────────────────────</span>', d: 100 },
      { html: `<pre class="ascii-mp">    ███╗   ███╗██████╗ 
    ████╗ ████║██╔══██╗
    ██╔████╔██║██████╔╝
    ██║╚██╔╝██║██╔═══╝ 
    ██║ ╚═╝ ██║██║     
    ╚═╝     ╚═╝╚═╝     </pre>`, d: 200 },
      { t: '<span class="info">welcome, michael.</span>', d: 100 },
      { t: '<span class="dim">opening :portfolio …</span>', d: 400 }
    ];
    let i = 0;
    function next() {
      if (i >= lines.length) {
        boot.style.transition = 'opacity .4s ease';
        boot.style.opacity = '0';
        setTimeout(() => boot.remove(), 450);
        return;
      }
      const L = lines[i++];
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = L.html || L.t;
      boot.appendChild(div);
      setTimeout(next, L.d);
    }
    // skip on click / keypress
    function skip() { i = lines.length; boot.innerHTML = ''; boot.remove(); }
    boot.addEventListener('click', skip);
    window.addEventListener('keydown', function once(e) {
      if (e.key === 'Escape' || e.key === 'Enter') { skip(); window.removeEventListener('keydown', once); }
    });
    next();
  })();
</script>

<script type="text/babel" src="portfolio.jsx"></script>
</body>
</html>
