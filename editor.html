<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>~/editor — :new-post</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #1a1b26;
    --bg-2: #16171f;
    --bg-3: #1f2030;
    --bg-elev: #232434;
    --fg: #c0caf5;
    --fg-dim: #9aa5ce;
    --fg-mute: #565f89;
    --line: #2a2b3d;
    --line-strong: #3b3d5b;
    --accent: #7aa2f7;
    --accent-2: #bb9af7;
    --accent-3: #9ece6a;
    --accent-warn: #e0af68;
    --accent-red: #f7768e;
    --accent-cyan: #7dcfff;
    --display: 'Fraunces', serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg-2); color: var(--fg);
    font-family: var(--mono); font-size: 14px;
    height: 100%; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .frame { height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

  /* titlebar */
  .titlebar {
    height: 30px; flex: none; background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 14px; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--fg-mute);
  }
  .traffic { display: flex; gap: 6px; }
  .traffic > span { width: 11px; height: 11px; border-radius: 50%; }
  .traffic .r { background: #ff5f57; } .traffic .y { background: #febc2e; } .traffic .g { background: #28c840; }
  .titlebar .path { margin-left: auto; margin-right: auto; }
  .titlebar .path b { color: var(--fg-dim); font-weight: 500; }
  .titlebar .actions { display: flex; gap: 8px; }
  .titlebar .actions a, .titlebar .actions button {
    background: transparent; border: 1px solid var(--line-strong);
    color: var(--fg-dim); font-family: var(--mono); font-size: 10px;
    padding: 3px 10px; cursor: pointer; text-decoration: none;
  }
  .titlebar .actions .primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .titlebar .actions a:hover, .titlebar .actions button:hover { color: var(--accent); border-color: var(--accent); }
  .titlebar .actions .primary:hover { color: var(--bg); background: var(--accent-cyan); border-color: var(--accent-cyan); }

  /* toolbar */
  .toolbar {
    flex: none; background: var(--bg-2); border-bottom: 1px solid var(--line);
    padding: 8px 12px; display: flex; align-items: center; gap: 4px;
    flex-wrap: wrap;
  }
  .tb-group { display: flex; gap: 2px; align-items: center; }
  .tb-sep { width: 1px; align-self: stretch; background: var(--line); margin: 0 8px; }
  .tb-btn {
    background: transparent; border: 1px solid transparent;
    color: var(--fg-dim); font-family: var(--mono); font-size: 12px;
    padding: 5px 9px; cursor: pointer; min-width: 28px;
    border-radius: 3px; display: inline-flex; align-items: center; gap: 4px;
    transition: background .12s, color .12s;
  }
  .tb-btn:hover { background: var(--bg-3); color: var(--fg); }
  .tb-btn.on { background: var(--accent); color: var(--bg); }
  .tb-btn b { font-weight: 700; }
  .tb-btn i { font-style: italic; }
  .tb-btn u { text-decoration: underline; }
  .tb-btn s { text-decoration: line-through; }
  .tb-btn .label { font-size: 10px; opacity: .7; }
  .tb-select {
    background: var(--bg-3); border: 1px solid var(--line);
    color: var(--fg); font-family: var(--mono); font-size: 11px;
    padding: 4px 8px; cursor: pointer;
  }
  .tb-spacer { flex: 1; }
  .word-count { color: var(--fg-mute); font-family: var(--mono); font-size: 11px; padding: 0 8px; }

  /* main body */
  .body { flex: 1; display: flex; min-height: 0; overflow: hidden; }

  /* meta sidebar */
  .meta-side {
    width: 280px; flex: none; background: var(--bg-2);
    border-right: 1px solid var(--line); padding: 16px 14px;
    overflow: auto; font-family: var(--mono); font-size: 12px;
  }
  .meta-side h4 {
    font-size: 10px; font-weight: 500; color: var(--fg-mute);
    text-transform: uppercase; letter-spacing: 1.2px; margin: 0 0 8px;
  }
  .meta-side h4:not(:first-child) { margin-top: 22px; }
  .meta-side .field {
    background: var(--bg); border: 1px solid var(--line);
    padding: 6px 10px; color: var(--fg); font-family: var(--mono); font-size: 12px;
    width: 100%; outline: none; resize: none;
  }
  .meta-side .field:focus { border-color: var(--accent); }
  .meta-side textarea.field { min-height: 60px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .tag-list .tag {
    background: var(--bg-3); border: 1px solid var(--line-strong);
    color: var(--accent-2); font-family: var(--mono); font-size: 10px;
    padding: 1px 6px; display: inline-flex; align-items: center; gap: 4px;
  }
  .tag-list .tag .x { cursor: pointer; opacity: .5; }
  .tag-list .tag .x:hover { opacity: 1; color: var(--accent-red); }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; color: var(--fg-dim); font-size: 11px;
  }
  .toggle-row input { accent-color: var(--accent); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat {
    background: var(--bg); border: 1px solid var(--line);
    padding: 8px; font-family: var(--mono); font-size: 10px; color: var(--fg-mute);
  }
  .stat b { display: block; color: var(--fg); font-size: 16px; font-weight: 500; margin-bottom: 2px; }

  /* editor */
  .editor-wrap {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
    background: var(--bg);
  }
  .editor-scroll {
    flex: 1; overflow: auto; padding: 32px 0;
  }
  .editor-scroll::-webkit-scrollbar { width: 8px; }
  .editor-scroll::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  .doc {
    max-width: 740px; margin: 0 auto; padding: 0 60px;
  }

  .doc-title {
    font-family: var(--display); font-weight: 400;
    font-size: 56px; line-height: 1.05; letter-spacing: -0.02em;
    color: var(--fg); background: transparent; border: none; outline: none;
    width: 100%; padding: 0; margin: 0 0 12px; resize: none;
  }
  .doc-title::placeholder { color: var(--fg-mute); font-style: italic; }
  .doc-subtitle {
    font-family: var(--mono); font-size: 13px; color: var(--fg-dim);
    background: transparent; border: none; outline: none;
    width: 100%; padding: 0; margin: 0 0 24px;
  }
  .doc-subtitle::placeholder { color: var(--fg-mute); }

  .doc-meta {
    display: flex; gap: 14px; align-items: center;
    padding-bottom: 24px; margin-bottom: 32px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; color: var(--fg-mute);
  }
  .doc-meta .avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--bg); font-weight: 700; font-size: 11px;
  }
  .doc-meta .author { color: var(--fg-dim); }

  /* contenteditable body */
  .doc-body {
    font-family: var(--display); font-size: 19px; line-height: 1.7;
    color: var(--fg); outline: none; min-height: 50vh;
  }
  .doc-body[data-empty="true"]::before {
    content: attr(data-placeholder); color: var(--fg-mute); font-style: italic; pointer-events: none;
  }
  .doc-body p { margin: 0 0 1.2em; }
  .doc-body h1 {
    font-family: var(--display); font-weight: 500; font-size: 36px; line-height: 1.15;
    margin: 1.6em 0 0.5em; color: var(--fg); letter-spacing: -0.01em;
  }
  .doc-body h2 {
    font-family: var(--display); font-weight: 500; font-size: 28px; line-height: 1.2;
    margin: 1.4em 0 0.4em; color: var(--fg);
  }
  .doc-body h3 {
    font-family: var(--display); font-weight: 500; font-size: 22px;
    margin: 1.2em 0 0.4em; color: var(--fg);
  }
  .doc-body strong { color: var(--fg); font-weight: 600; }
  .doc-body em { color: var(--accent); font-style: italic; }
  .doc-body u { text-decoration-color: var(--accent-2); text-underline-offset: 4px; }
  .doc-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--line-strong); }
  .doc-body a:hover { text-decoration-color: var(--accent); }
  .doc-body blockquote {
    border-left: 3px solid var(--accent-2);
    padding: 4px 20px; margin: 1.4em 0;
    color: var(--fg-dim); font-style: italic;
  }
  .doc-body ul, .doc-body ol { padding-left: 28px; margin: 1em 0 1.2em; }
  .doc-body li { margin-bottom: 0.4em; }
  .doc-body hr { border: none; border-top: 1px dashed var(--line-strong); margin: 2em 0; }
  .doc-body code {
    font-family: var(--mono); font-size: 0.85em;
    background: var(--bg-3); color: var(--accent-3);
    padding: 2px 6px; border-radius: 3px; border: 1px solid var(--line);
  }
  .doc-body pre {
    background: var(--bg-2); border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 16px 18px; border-radius: 4px;
    overflow: auto; margin: 1.4em 0;
    font-family: var(--mono); font-size: 13px; line-height: 1.6;
    color: var(--fg);
    position: relative;
  }
  .doc-body pre::before {
    content: attr(data-lang);
    position: absolute; top: 6px; right: 10px;
    font-family: var(--mono); font-size: 10px; color: var(--fg-mute);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .doc-body pre code { background: none; border: none; color: inherit; padding: 0; font-size: inherit; }
  .doc-body img, .doc-body video, .doc-body iframe {
    max-width: 100%; display: block; margin: 1.4em auto;
    border: 1px solid var(--line); border-radius: 4px;
  }
  .doc-body iframe { width: 100%; aspect-ratio: 16/9; }
  .doc-body figure { margin: 1.6em 0; }
  .doc-body figcaption { font-family: var(--mono); font-size: 11px; color: var(--fg-mute); text-align: center; margin-top: 8px; }
  .doc-body .callout {
    background: var(--bg-2); border: 1px solid var(--line);
    border-left: 3px solid var(--accent-warn);
    padding: 14px 18px; margin: 1.4em 0;
    font-family: var(--mono); font-size: 13px;
    color: var(--fg-dim);
  }
  .doc-body .callout strong { color: var(--accent-warn); }

  /* slash menu */
  .slash-menu {
    position: absolute; z-index: 50;
    background: var(--bg-2); border: 1px solid var(--line-strong);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    width: 280px; max-height: 360px; overflow: auto;
    font-family: var(--mono); font-size: 12px;
  }
  .slash-menu .item {
    display: flex; gap: 12px; padding: 8px 12px; cursor: pointer;
    color: var(--fg-dim); border-bottom: 1px solid var(--line);
  }
  .slash-menu .item:last-child { border-bottom: none; }
  .slash-menu .item.sel { background: var(--accent); color: var(--bg); }
  .slash-menu .item .ico {
    width: 28px; height: 28px; flex: none;
    background: var(--bg-3); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--accent);
  }
  .slash-menu .item.sel .ico { background: var(--bg); color: var(--accent); border-color: var(--bg); }
  .slash-menu .item .text { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
  .slash-menu .item .text b { color: var(--fg); font-weight: 500; }
  .slash-menu .item.sel .text b { color: var(--bg); }
  .slash-menu .item .text small { color: var(--fg-mute); font-size: 10px; }
  .slash-menu .item.sel .text small { color: var(--bg); opacity: .7; }
  .slash-menu .header {
    padding: 6px 12px; color: var(--fg-mute); font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.2px;
    border-bottom: 1px solid var(--line); background: var(--bg-3);
  }

  /* floating bubble menu (selection) */
  .bubble {
    position: absolute; z-index: 60;
    background: var(--bg-2); border: 1px solid var(--line-strong);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    padding: 4px; display: flex; gap: 2px;
    font-family: var(--mono);
  }
  .bubble button {
    background: transparent; border: none; color: var(--fg-dim);
    padding: 5px 9px; cursor: pointer; font: inherit; font-size: 12px;
    border-radius: 2px;
  }
  .bubble button:hover { background: var(--bg-3); color: var(--fg); }
  .bubble button.on { background: var(--accent); color: var(--bg); }

  /* link dialog */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 100; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--bg-2); border: 1px solid var(--line-strong);
    width: 460px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }
  .modal .head {
    padding: 12px 16px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 12px; color: var(--fg-dim);
  }
  .modal .head b { color: var(--accent); }
  .modal .head .x { cursor: pointer; color: var(--fg-mute); }
  .modal .body { padding: 16px; }
  .modal label {
    display: block; color: var(--fg-mute); font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px;
  }
  .modal input, .modal textarea, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--line);
    color: var(--fg); font-family: var(--mono); font-size: 13px;
    padding: 8px 10px; outline: none; margin-bottom: 14px;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
  .modal .row { display: flex; gap: 8px; justify-content: flex-end; }
  .modal .row button {
    background: transparent; border: 1px solid var(--line-strong);
    color: var(--fg-dim); font-family: var(--mono); font-size: 12px;
    padding: 6px 14px; cursor: pointer;
  }
  .modal .row .primary {
    background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600;
  }
  .modal .row button:hover:not(.primary) { color: var(--accent); border-color: var(--accent); }

  /* code-block embed editor */
  .cb-editor {
    background: var(--bg); border: 1px solid var(--line);
    font-family: var(--mono); font-size: 13px; color: var(--fg);
    padding: 12px; min-height: 140px; resize: vertical; outline: none;
    width: 100%;
  }

  /* status line */
  .statusline {
    height: 24px; flex: none; display: flex; align-items: center;
    background: var(--bg-2); border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; color: var(--fg-dim);
  }
  .statusline .seg { padding: 0 10px; height: 100%; display: flex; align-items: center; gap: 6px; }
  .statusline .mode { background: var(--accent-3); color: var(--bg); font-weight: 700; letter-spacing: 1px; }
  .statusline .right { margin-left: auto; display: flex; }
  .statusline .right .seg { background: var(--bg-3); border-left: 1px solid var(--line); }
  .statusline .right .seg.last { background: var(--accent); color: var(--bg); font-weight: 600; }

  /* toast */
  .toast {
    position: fixed; bottom: 36px; right: 16px;
    background: var(--bg-2); border: 1px solid var(--line-strong);
    border-left: 3px solid var(--accent-3);
    padding: 10px 16px; font-family: var(--mono); font-size: 12px;
    color: var(--fg); box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 200; transition: opacity .3s, transform .3s;
  }
  .toast.error { border-left-color: var(--accent-red); }

  /* preview mode */
  body.preview .toolbar, body.preview .meta-side { display: none; }
  body.preview .doc-title, body.preview .doc-subtitle { pointer-events: none; }
  body.preview .doc-body { caret-color: transparent; }

  @media (max-width: 900px) {
    .meta-side { display: none; }
    .doc { padding: 0 24px; }
  }
</style>
</head>
<body>
<div id="root" class="frame"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="editor.jsx"></script>
</body>
</html>
